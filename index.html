<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe Control Pro - Masterpiece Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010005; color: white; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; position: relative; z-index: 5; }
        
        #lyrics-container { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 20; text-align: center; width: 90%; pointer-events: none; }
        #lyrics-text { 
            font-size: 2.3rem; font-weight: 800; color: #ffffff; 
            text-shadow: 0 0 15px #ffffff, 0 0 30px #7dd3fc; 
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: inline-block; opacity: 0; transform: translateY(30px) scale(0.8); 
        }
        #lyrics-text.active { opacity: 1; transform: translateY(0) scale(1); animation: glow-pulse 2s infinite alternate; }

        @keyframes glow-pulse { from { text-shadow: 0 0 10px #ffffff, 0 0 20px #7dd3fc; } to { text-shadow: 0 0 20px #d8b4fe, 0 0 40px #c084fc; } }

        #ui-layer { 
            position: absolute; top: 40%; left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; pointer-events: none; 
            z-index: 10; opacity: 0; transition: opacity 1.5s ease; 
            width: 90%;
        }
        #ui-layer.show { opacity: 1; }
        h1 { 
            font-size: 3.8rem; margin: 0; 
            color: #fff;
            text-shadow: 0 0 20px #ffffff, 0 0 40px #d8b4fe; 
            letter-spacing: 7px;
            font-weight: 900;
        }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { padding: 25px 70px; font-size: 1.8rem; background: none; color: #ffffff; border: 3px solid #7dd3fc; border-radius: 60px; cursor: pointer; box-shadow: 0 0 25px #d8b4fe; letter-spacing: 8px; transition: 0.4s; }
        #start-btn:hover { background: #fff; color: #000; box-shadow: 0 0 60px #ffffff; }

        #video-bg { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            object-fit: cover; z-index: 1; transform: scaleX(-1); 
            opacity: 0.4; filter: none; 
        }

        #video-focus { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 2; transform: scaleX(-1); opacity: 0.7; 
            -webkit-mask-image: radial-gradient(circle, black 30%, transparent 80%); 
            mask-image: radial-gradient(circle, black 30%, transparent 80%); 
        }
        #status-box { position: absolute; top: 20px; left: 20px; z-index: 25; background: rgba(0,0,0,0.85); padding: 12px 24px; border: 2px solid #7dd3fc; color: #fff; font-family: monospace; border-radius: 12px; }
        #yt-player-container { position: absolute; top: -1000px; left: -1000px; width: 1px; height: 1px; overflow: hidden; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color: #fff; margin-bottom: 20px; letter-spacing: 10px;">IRIS UNIVERSE</h1>
        <button id="start-btn">BUKA SEMESTA ✨</button>
    </div>

    <div id="status-box">Menghubungkan AI...</div>
    <div id="ui-layer">
        <h1 id="revani-title">REVANI KHOIRUNNISA AZZAHRA</h1>
        <p style="font-size: 1.8rem; color: #7dd3fc; font-style: italic; text-shadow: 0 0 10px #7dd3fc;">"IloveYou Ya Kita Sama Sama Terus Okay??" ✨❤️</p>
    </div>
    <div id="lyrics-container"><div id="lyrics-text">... Synerging ...</div></div>
    <div id="yt-player-container"><div id="yt-player"></div></div>

    <video id="video-bg" autoplay playsinline muted></video>
    <video id="video-focus" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // ==========================================
        // 1. DATA & MUSIC SETUP
        // ==========================================
        const lyricsData = [
            { t: 0, text: "Iris - Goo Goo Dolls" },
            { t: 14, text: "And I'd give up forever to touch you" },
            { t: 21, text: "Cause I know that you feel me somehow" },
            { t: 28, text: "You're the closest to heaven that I'll ever be" },
            { t: 34, text: "And I don't want to go home right now" },
            { t: 42, text: "And all I can taste is this moment" },
            { t: 49, text: "And all I can breathe is your life" },
            { t: 56, text: "And sooner or later, it's over" },
            { t: 62, text: "I just don't wanna miss you tonight" },
            { t: 69, text: "And I don't want the world to see me" },
            { t: 139, text: "When everything's made to be broken" },
            { t: 143, text: "I just want you to know who I am" },
            { t: 228, text: "I just want you to know who I am..." }
        ];

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                videoId: 'xK4ZqrLys_k',
                playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'xK4ZqrLys_k', 'controls': 0 },
                events: { 'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) player.playVideo(); } }
            });
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let isHandsReady = false; 

        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; initParticles(); });

        let particles = [];
        const particleCount = 2300; 
        let currentMode = 'GALAXY_SPIRAL'; 
        let supernovaStart = 0;
        let pointerX = width / 2, pointerY = height / 2;
        let currentHandLandmarks = [];

        // ==========================================
        // 2. PHYSICS ENGINE
        // ==========================================
        class Particle {
            constructor() { this.init(); this.x = Math.random()*width; this.y = Math.random()*height; }
            init() {
                this.type = Math.random() > 0.94 ? 'PLANET' : 'STAR';
                this.size = this.type === 'PLANET' ? Math.random()*3 + 2.5 : Math.random()*0.8 + 0.3;
                
                const r = Math.random();
                if (r < 0.6) this.color = '#FFFFFF';
                else if (r < 0.8) this.color = '#7DD3FC';
                else this.color = '#D8B4FE';

                this.r = Math.pow(Math.random(), 1.5) * Math.max(width, height) * 0.8;
                this.baseA = Math.random() * Math.PI * 2;
                this.bhZone = Math.random(); 
                this.t = Math.PI * 2 * Math.random();
                const hx = 16 * Math.pow(Math.sin(this.t), 3);
                const hy = 13 * Math.cos(this.t) - 5 * Math.cos(2 * this.t) - 2 * Math.cos(3 * this.t) - Math.cos(4 * this.t);
                this.heartX = (width/2) + (hx * (Math.min(width,height)/17)); 
                this.heartY = (height/2) - (hy * (Math.min(width,height)/17));
                
                this.metX = -(35 + Math.random()*35); 
                this.metY = (25 + Math.random()*30);
                this.snAngle = Math.random()*Math.PI*2;
                this.snVel = 20 + Math.random()*30;
                this.randOff = Math.random()*500;
            }
            update(time, mode) {
                if (!isFinite(this.x)) this.x = Math.random() * width;
                let tx = this.x, ty = this.y, lerp = 0.05;
                const centerX = width / 2;
                const centerY = height / 2;

                switch(mode) {
                    case 'ANTIGRAVITY': this.y -= 2.2; if (this.y < -50) this.y = height + 50; return;
                    case 'COMET': tx = pointerX + Math.cos(this.baseA + time*12)*45; ty = pointerY + Math.sin(this.baseA+time*12)*45; lerp = 0.3; break;
                    case 'DNA_HELIX': const dx = (this.baseA * 150 + time * 350) % width; tx = dx; ty = (centerY) + Math.sin(dx * 0.01 + time*4) * 180 * (this.baseA > Math.PI ? 1 : -1); lerp = 0.15; break;
                    case 'INFINITY_LOOP': const it = time * 2.5 + this.baseA; tx = (centerX) + Math.cos(it) * (width*0.4); ty = (centerY) + Math.sin(it*2) * (height*0.25); lerp = 0.08; break;
                    case 'WORMHOLE': const wr = (this.r + time*600) % (Math.max(width, height)); tx = (centerX) + Math.cos(this.baseA) * wr; ty = (centerY) + Math.sin(this.baseA) * wr; lerp = 0.2; break;
                    case 'GALAXY_SPIRAL': const ga = this.baseA + (this.r*0.002) + (time * 0.15); tx = centerX + Math.cos(ga) * this.r; ty = centerY + Math.sin(ga) * this.r; break;
                    case 'METEOR_SHOWER': if(this.type === 'PLANET') { this.x += this.metX; this.y += this.metY; if(this.y > height + 100 || this.x < -100){ this.x=Math.random()*width+500; this.y=-200; } return; } tx = centerX + Math.cos(this.baseA)*this.r; ty = centerY + Math.sin(this.baseA)*this.r; break;
                    case 'SATURN_RINGS': tx = centerX + Math.cos(time*3 + this.baseA)*this.r; ty = centerY + Math.sin(time*3 + this.baseA)*(this.r*0.15); break;
                    
                    case 'BLACK_HOLE': 
                        const slowOrbitSpeed = time * 0.7 + (this.r * 0.002);
                        const angle = this.baseA + slowOrbitSpeed;
                        const distFromCenter = 80 + (this.r * 0.45);
                        tx = centerX + Math.cos(angle) * distFromCenter;
                        ty = centerY + Math.sin(angle) * distFromCenter * 0.35; 
                        lerp = 0.12;
                        break;

                    case 'NEBULA_CLOUD': tx = this.x + Math.sin(time*3 + this.randOff)*12; ty = this.y + Math.cos(time*3 + this.randOff)*12; lerp = 0.15; break;
                    case 'SUPERNOVA': 
                        const elapsed = (Date.now() - supernovaStart) / 1000;
                        if(elapsed < 1.2) { tx = centerX + (Math.random()-0.5)*80; ty = centerY + (Math.random()-0.5)*80; lerp = 0.25; }
                        else { this.x += Math.cos(this.snAngle)*this.snVel; this.y += Math.sin(this.snAngle)*this.snVel; if(this.x < -200 || this.x > width+200){this.x=centerX;this.y=centerY;} return; }
                        break;
                    case 'SECRET_HEART': tx = this.heartX + (Math.random()-0.5)*145; ty = this.heartY + (Math.random()-0.5)*145; lerp = 0.18; break;
                }
                this.x += (tx - this.x) * lerp; this.y += (ty - this.y) * lerp;
            }
            draw(mode) {
                if(!isFinite(this.x)) return;
                
                if(mode === 'METEOR_SHOWER' && this.type === 'PLANET') {
                    ctx.globalCompositeOperation = 'lighter';
                    const grad = ctx.createLinearGradient(this.x, this.y, this.x - this.metX * 5, this.y - this.metY * 5);
                    grad.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                    grad.addColorStop(1, 'transparent');
                    ctx.strokeStyle = grad; ctx.lineWidth = this.size * 1.5; ctx.lineCap = 'round';
                    ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x - this.metX * 5, this.y - this.metY * 5); ctx.stroke();
                }

                if (mode === 'SECRET_HEART') {
                    ctx.globalCompositeOperation = 'lighter';
                    let g = ctx.createRadialGradient(this.x-this.size*0.3, this.y-this.size*0.3, 0, this.x, this.y, this.size);
                    g.addColorStop(0, '#FFFFFF'); g.addColorStop(0.4, '#7DD3FC'); g.addColorStop(1, '#D8B4FE');
                    if(this.type === 'PLANET') { ctx.shadowBlur = 8; ctx.shadowColor = '#D8B4FE'; }
                    ctx.fillStyle = g;
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 1.4, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = this.color;
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                }
            }
        }
        function initParticles(){ particles=[]; for(let i=0;i<particleCount;i++) particles.push(new Particle()); }
        initParticles();

        // ==========================================
        // 3. AI & EXCLUSIVE SHAPE DETECTION
        // ==========================================
        const lirikEl = document.getElementById('lyrics-text'), uiLayer = document.getElementById('ui-layer');
        const statusBox = document.getElementById('status-box');
        let stableFingers = 5, heartHold = 0, votes = [];

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.3, minTrackingConfidence: 0.6 });
        
        hands.onResults((res) => {
            currentHandLandmarks = res.multiHandLandmarks || [];
            if(currentHandLandmarks.length === 0){
                currentMode = 'GALAXY_SPIRAL'; uiLayer.classList.remove('show');
                statusBox.innerHTML = "🔍 Mencari Tangan..."; votes = []; return;
            }
            let rawF = 0, isSwanNeck = false;
            const h0 = currentHandLandmarks[0];
            if(h0 && h0[8]){ pointerX = (1-h0[8].x)*width; pointerY = h0[8].y*height; }
            if(currentHandLandmarks.length === 2){
                const h1 = currentHandLandmarks[0], h2 = currentHandLandmarks[1];
                const dWrist = Math.hypot(h1[0].x - h2[0].x, h1[0].y - h2[0].y); 
                const dIndex = Math.hypot(h1[8].x - h2[8].x, h1[8].y - h2[8].y);
                const h1Closed = (h1[12].y > h1[10].y) && (h1[16].y > h1[14].y) && (h1[20].y > h1[18].y);
                const h2Closed = (h2[12].y > h2[10].y) && (h2[16].y > h2[14].y) && (h2[20].y > h2[18].y);
                if(dWrist < 0.55 && dIndex < 0.22 && h1Closed && h2Closed && h1[8].y < h1[0].y) isSwanNeck = true;
            }
            if(isSwanNeck) heartHold++; else heartHold = Math.max(0, heartHold - 2);
            if(heartHold > 8){ currentMode = 'SECRET_HEART'; uiLayer.classList.add('show'); statusBox.innerHTML = "💎 DREAMY LOVE ACTIVE ❤️"; }
            else {
                uiLayer.classList.remove('show');
                currentHandLandmarks.forEach((lm, i) => {
                    const side = res.multiHandedness[i] ? res.multiHandedness[i].label : "Right";
                    [8, 12, 16, 20].forEach(t => { if(lm[t] && lm[t-2] && lm[t].y < lm[t-2].y) rawF++; });
                    if(lm[4] && lm[3] && (side==="Left"?lm[4].x > lm[3].x : lm[4].x < lm[3].x)) rawF++;
                });
                votes.push(Math.min(rawF, 10)); if(votes.length>8) votes.shift();
                let counts={}; votes.forEach(v => counts[v]=(counts[v]||0)+1);
                let maxC=0, votedVal=stableFingers;
                for(let v in counts){ if(counts[v]>maxC){maxC=counts[v]; votedVal=parseInt(v);} }
                if(votedVal === 10 && stableFingers !== 10) supernovaStart = Date.now();
                stableFingers = votedVal;
                const ms = ['ANTIGRAVITY','COMET','DNA_HELIX','INFINITY_LOOP','WORMHOLE','GALAXY_SPIRAL','METEOR_SHOWER','SATURN_RINGS','BLACK_HOLE','NEBULA_CLOUD','SUPERNOVA'];
                currentMode = ms[stableFingers] || 'GALAXY_SPIRAL';
                statusBox.innerHTML = `MODE: ${currentMode} (${stableFingers} JARI)`;
            }
        });

        // ==========================================
        // 4. BOOTSTRAP & RENDER
        // ==========================================
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('overlay').style.display='none';
            if(player && player.playVideo){ player.unMute(); player.playVideo(); }
            startCamera();
        });

        async function startCamera() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});
                document.getElementById('video-bg').srcObject = s;
                document.getElementById('video-focus').srcObject = s;
                await hands.initialize(); isHandsReady = true; animate(); processAI();
            } catch(e) { statusBox.innerHTML = "❌ Kamera Error"; }
        }

        async function processAI() { if(isHandsReady && document.getElementById('video-focus').readyState >= 2) await hands.send({image:document.getElementById('video-focus')}); requestAnimationFrame(processAI); }

        function animate() {
            ctx.globalCompositeOperation = 'destination-out'; ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0,0,width,height);
            ctx.globalCompositeOperation = 'source-over';
            
            const centerX = width / 2;
            const centerY = height / 2;

            if(currentMode === 'BLACK_HOLE'){
                let diskGlow = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 230);
                diskGlow.addColorStop(0, 'rgba(125, 211, 252, 0.2)');
                diskGlow.addColorStop(0.5, 'rgba(216, 180, 254, 0.1)');
                diskGlow.addColorStop(1, 'transparent');
                ctx.fillStyle = diskGlow;
                ctx.beginPath(); ctx.ellipse(centerX, centerY, 230, 85, 0, 0, Math.PI*2); ctx.fill();
            }

            particles.forEach(p => { p.update(Date.now()*0.001, currentMode); p.draw(currentMode); });

            // MODIFIKASI: GRADASI BOLA HITAM (SINGULARITY)
            if(currentMode === 'BLACK_HOLE'){
                // Outer Blur/Gradasi Singularity biar gak kaku
                let singGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 70);
                singGrad.addColorStop(0, '#000000');     // Inti Paling Hitam
                singGrad.addColorStop(0.8, '#000000');   // Masih Hitam Pekat
                singGrad.addColorStop(1, 'rgba(20, 0, 40, 0)'); // Fading ke transparan di pinggir
                
                ctx.fillStyle = singGrad;
                ctx.beginPath(); ctx.arc(centerX, centerY, 72, 0, Math.PI*2); ctx.fill();
                
                // Ring Inner White Glow (Pusat Accretion)
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.ellipse(centerX, centerY, 80, 28, 0, 0, Math.PI*2); ctx.stroke();
            }

            if (currentHandLandmarks.length > 0) {
                currentHandLandmarks.forEach((lm, idx) => {
                    ctx.strokeStyle = idx === 0 ? 'rgba(255, 255, 255, 0.25)' : 'rgba(216, 180, 254, 0.25)'; 
                    ctx.lineWidth = 2.5;
                    const c = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
                    c.forEach(n => { ctx.beginPath(); ctx.moveTo((1-lm[n[0]].x)*width, lm[n[0]].y*height); ctx.lineTo((1-lm[n[1]].x)*width, lm[n[1]].y*height); ctx.stroke(); });
                });
            }

            if(player && player.getCurrentTime){
                const ct = player.getCurrentTime();
                const active = lyricsData.filter(l => l.t <= ct).pop();
                if(active && lirikEl.innerText !== active.text){
                    lirikEl.classList.remove('active');
                    setTimeout(() => { lirikEl.innerText = active.text; lirikEl.classList.add('active'); }, 50);
                }
            }
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
